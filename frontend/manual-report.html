<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Vexis — Manual Report</title>
  <meta name="description" content="Upload OBD-II CSV data and get an AI-powered vehicle health PDF report instantly."/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/global.css"/>
  <link rel="stylesheet" href="css/dashboard.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script type="module" src="js/sidebar.js" defer></script>
  <script type="module" src="js/dashboard.js" defer></script>
  <script type="module" src="js/manual-report.js" defer></script>
</head>
<body>

<div class="grid-bg"></div>

<div class="app-layout">

  <!-- ═══════════════════════════════════════
       HEADER
  ════════════════════════════════════════ -->
  <header class="dash-header" id="dash-header">

    <!-- Left: Logo -->
    <div class="header-left">
      <a href="#" class="dash-logo" id="logo-home">
        <svg viewBox="0 0 40 40" fill="none" width="36" height="36">
          <polygon points="20,2 37,11 37,29 20,38 3,29 3,11" stroke="#00e5ff" stroke-width="1.8" fill="rgba(0,229,255,0.07)"/>
          <polyline points="6,22 10,22 14,13 17,27 20,18 23,23 26,23 29,15 33,20" stroke="#00e5ff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
        <span class="dash-logo-text">VEXIS</span>
      </a>
    </div>

    <!-- Center: Live clock -->
    <div class="header-center">
      <span id="live-clock" class="live-clock">--</span>
    </div>

    <!-- Right: Status + User + Logout -->
    <div class="header-right">

      <!-- OBD Status -->
      <div id="header-obd-status" class="header-obd">
        <span class="obd-dot disconnected" id="obd-dot"></span>
        <span class="obd-label" id="obd-label">OBD Disconnected</span>
      </div>

      <!-- Notifications -->
      <button class="notif-btn" id="notif-btn" aria-label="Notifications">
        <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
          <path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        <span class="notif-badge" id="notif-badge" style="display:none">0</span>
      </button>

      <!-- User info -->
      <div class="user-info">
        <img id="user-photo" src="" alt="" style="display:none;width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid rgba(0,229,255,0.4)"/>
        <div class="user-avatar" id="user-avatar">--</div>
        <span class="user-name" id="user-name">Loading...</span>
      </div>

      <!-- Logout -->
      <button id="logout-btn" class="logout-btn">
        <svg viewBox="0 0 24 24" fill="none" width="16" height="16">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Logout</span>
      </button>

    </div>
  </header>

  <!-- ═══════════════════════════════════════
       SIDEBAR
  ════════════════════════════════════════ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-inner">

      <nav class="sidebar-nav">

        <div class="nav-item" data-section="dashboard" id="nav-dashboard">
          <div class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
              <rect x="3" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.8"/>
              <rect x="14" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.8"/>
              <rect x="3" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.8"/>
              <rect x="14" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.8"/>
            </svg>
          </div>
          <span class="nav-label">Dashboard</span>
          <div class="nav-tooltip">Dashboard</div>
        </div>

        <div class="nav-item" data-section="vehicles" id="nav-vehicles">
          <div class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
              <path d="M5 17H3a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h14l4 4v4a2 2 0 0 1-2 2h-2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <circle cx="7.5" cy="17.5" r="2.5" stroke="currentColor" stroke-width="1.8"/>
              <circle cx="17.5" cy="17.5" r="2.5" stroke="currentColor" stroke-width="1.8"/>
            </svg>
          </div>
          <span class="nav-label">My Vehicles</span>
          <div class="nav-tooltip">My Vehicles</div>
        </div>

        <div class="nav-item" data-section="reports" id="nav-reports">
          <div class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <path d="M14 2v6h6M16 13H8M16 17H8M10 9H8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </div>
          <span class="nav-label">Past Reports</span>
          <div class="nav-tooltip">Past Reports</div>
        </div>

        <div class="nav-item active" data-section="manual" id="nav-manual">
          <div class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <polyline points="17 8 12 3 7 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <line x1="12" y1="3" x2="12" y2="15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </div>
          <span class="nav-label">Manual Report</span>
          <div class="nav-tooltip">Manual Report</div>
        </div>

        <div class="nav-item" data-section="profile" id="nav-profile">
          <div class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
              <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8"/>
              <path d="M4 20c0-4 3.582-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </div>
          <span class="nav-label">Profile</span>
          <div class="nav-tooltip">Profile</div>
        </div>

        <div class="nav-item" data-section="settings" id="nav-settings">
          <div class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
              <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-1.42 3.42 2 2 0 0 1-1.41-.59l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" stroke="currentColor" stroke-width="1.8"/>
            </svg>
          </div>
          <span class="nav-label">Settings</span>
          <div class="nav-tooltip">Settings</div>
        </div>

      </nav>

      <!-- Version -->
      <div class="sidebar-version">v1.0.0</div>

    </div>
  </aside>

  <!-- ═══════════════════════════════════════
       MAIN CONTENT
  ════════════════════════════════════════ -->
  <main class="main-content" id="main-content">

    <!-- OBD Connection Banner -->
    <div id="obd-banner" class="obd-banner hidden">
      <div class="banner-left">
        <span class="banner-dot"></span>
        <span id="banner-text">OBD Scanner Connected</span>
        <span id="banner-port" class="banner-port"></span>
      </div>
      <div class="banner-right">
        <span class="live-badge">● LIVE</span>
        <button id="banner-dismiss" class="banner-dismiss">✕</button>
      </div>
    </div>

    <!-- Dynamic content loads here — manual-report.js injects into this -->
    <div id="content-area"></div>

    <!-- Footer -->
    <footer class="dash-footer">
      <span>&copy; 2025 Vexis</span>
      <span>AI Vehicle Intelligence Platform</span>
      <span>v1.0.0</span>
    </footer>

  </main>

  <!-- ═══════════════════════════════════════
       MOBILE BOTTOM NAV
  ════════════════════════════════════════ -->
  <nav class="mobile-nav" id="mobile-nav">

    <div class="mobile-nav-item" data-section="dashboard">
      <svg viewBox="0 0 24 24" fill="none" width="22" height="22">
        <rect x="3" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.8"/>
        <rect x="14" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.8"/>
        <rect x="3" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.8"/>
        <rect x="14" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.8"/>
      </svg>
      <span>Home</span>
    </div>

    <div class="mobile-nav-item" data-section="vehicles">
      <svg viewBox="0 0 24 24" fill="none" width="22" height="22">
        <path d="M5 17H3a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h14l4 4v4a2 2 0 0 1-2 2h-2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="7.5" cy="17.5" r="2.5" stroke="currentColor" stroke-width="1.8"/>
        <circle cx="17.5" cy="17.5" r="2.5" stroke="currentColor" stroke-width="1.8"/>
      </svg>
      <span>Vehicles</span>
    </div>

    <div class="mobile-nav-item active" data-section="manual">
      <svg viewBox="0 0 24 24" fill="none" width="22" height="22">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <polyline points="17 8 12 3 7 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="12" y1="3" x2="12" y2="15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <span>Manual</span>
    </div>

    <div class="mobile-nav-item" data-section="profile">
      <svg viewBox="0 0 24 24" fill="none" width="22" height="22">
        <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8"/>
        <path d="M4 20c0-4 3.582-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <span>Profile</span>
    </div>

    <div class="mobile-nav-item" data-section="settings">
      <svg viewBox="0 0 24 24" fill="none" width="22" height="22">
        <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" stroke="currentColor" stroke-width="1.8"/>
      </svg>
      <span>Settings</span>
    </div>

  </nav>

</div><!-- /app-layout -->

</body>
</html>
