<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Vexis — Reset Password</title>
  <meta name="description" content="Reset your Vexis account password securely."/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/global.css"/>
  <link rel="stylesheet" href="css/login.css"/>
  <style>
    .reset-card {
      width: 100%;
      max-width: 440px;
      margin: 0 auto;
    }
    .strength-wrap {
      margin-top: 8px;
    }
    .strength-bar {
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      width: 0;
      border-radius: 2px;
      transition: width 0.3s ease, background 0.3s ease;
    }
    .strength-text {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      display: block;
    }
    .match-indicator {
      position: absolute;
      right: 44px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
    }
    .success-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 16px;
      padding: 32px 0;
    }
    .success-state .checkmark-circle {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: rgba(0,230,118,0.12);
      border: 2px solid var(--success);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .reset-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .error-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 16px;
      padding: 32px 0;
    }
    .error-icon {
      font-size: 56px;
    }
  </style>
</head>
<body>

<div class="grid-bg"></div>
<div class="orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="reset-wrapper">
  <div class="reset-card">

    <!-- Logo -->
    <div style="text-align:center;margin-bottom:32px">
      <a href="index.html" style="text-decoration:none;display:inline-flex;align-items:center;gap:10px">
        <svg viewBox="0 0 48 48" fill="none" width="40" height="40">
          <polygon points="24,2 44,13 44,35 24,46 4,35 4,13" stroke="#00e5ff" stroke-width="2" fill="rgba(0,229,255,0.08)"/>
          <polyline points="8,26 13,26 17,16 21,32 25,22 28,28 31,28 35,18 39,24" stroke="#00e5ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
        <span style="font-family:var(--font-display);font-size:22px;font-weight:900;color:var(--accent);letter-spacing:4px">VEXIS</span>
      </a>
    </div>

    <!-- Glass card -->
    <div class="glass-card" style="padding:40px;border-radius:var(--radius-lg)">

      <!-- ERROR STATE (no token) -->
      <div id="error-state" class="error-state" style="display:none">
        <div class="error-icon">🔗</div>
        <h2 style="font-family:var(--font-display);font-size:22px;color:var(--danger);margin:0">Invalid Reset Link</h2>
        <p style="color:var(--muted);margin:0">This reset link is missing or invalid.<br>Please request a new one.</p>
        <a href="login.html" class="btn-primary" style="text-decoration:none;padding:12px 28px;border-radius:var(--radius-sm);font-size:14px;font-weight:700">
          Back to Login
        </a>
      </div>

      <!-- RESET FORM -->
      <div id="reset-form-state">
        <h2 style="font-family:var(--font-display);font-size:22px;color:var(--text);margin:0 0 6px">Reset Your Password</h2>
        <p style="color:var(--muted);font-size:14px;margin:0 0 28px">Enter your new password below</p>

        <div id="reset-error" class="error-msg"></div>

        <!-- New Password -->
        <div class="input-group">
          <span class="input-icon">
            <svg viewBox="0 0 20 20" fill="none"><rect x="3" y="8" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M7 8V5a3 3 0 0 1 6 0v3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="10" cy="13" r="1.5" fill="currentColor"/></svg>
          </span>
          <input id="new-password" type="password" placeholder="New password (min 8 chars)" autocomplete="new-password"/>
          <button class="eye-toggle" type="button" data-target="new-password" aria-label="Toggle password">
            <svg class="eye-show" viewBox="0 0 20 20" fill="none"><path d="M1 10s3.5-6 9-6 9 6 9 6-3.5 6-9 6-9-6-9-6z" stroke="currentColor" stroke-width="1.5"/><circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5"/></svg>
            <svg class="eye-hide" viewBox="0 0 20 20" fill="none" style="display:none"><path d="M2 2l16 16M7.5 7.6A3 3 0 0 0 10 13c1.65 0 3-1.35 3-3 0-.88-.36-1.67-.94-2.24M4.1 4.9C2.5 6.08 1 8 1 10s3.5 6 9 6a9.4 9.4 0 0 0 5-1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M8 4.16A9.4 9.4 0 0 1 10 4c5.5 0 9 6 9 6a13 13 0 0 1-1.5 2.1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
        </div>
        <!-- Strength bar -->
        <div class="strength-wrap">
          <div class="strength-bar"><div class="strength-fill" id="reset-strength-fill"></div></div>
          <span class="strength-text" id="reset-strength-text"></span>
        </div>

        <!-- Confirm Password -->
        <div class="input-group" style="margin-top:16px">
          <span class="input-icon">
            <svg viewBox="0 0 20 20" fill="none"><rect x="3" y="8" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M7 8V5a3 3 0 0 1 6 0v3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="10" cy="13" r="1.5" fill="currentColor"/></svg>
          </span>
          <input id="confirm-password" type="password" placeholder="Confirm new password" autocomplete="new-password"/>
          <span class="match-indicator" id="match-indicator"></span>
        </div>

        <button id="reset-btn" class="btn-primary btn-full" type="button" style="margin-top:24px">
          <span class="btn-text">Reset Password</span>
          <span class="btn-spinner" style="display:none"><span class="spinner"></span> Resetting...</span>
        </button>

        <p style="text-align:center;margin-top:20px;font-size:13px;color:var(--muted)">
          <a href="login.html" style="color:var(--accent);text-decoration:none">← Back to Login</a>
        </p>
      </div>

      <!-- SUCCESS STATE -->
      <div id="success-state" class="success-state" style="display:none">
        <div class="checkmark-circle">
          <svg viewBox="0 0 40 40" fill="none" width="36" height="36">
            <polyline points="8,21 16,29 32,13" stroke="#00e676" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h2 style="font-family:var(--font-display);font-size:22px;color:var(--success);margin:0">Password Reset!</h2>
        <p style="color:var(--muted);margin:0">Your password has been updated successfully.<br>Redirecting to login...</p>
        <div class="spinner" style="width:20px;height:20px;border-width:2px"></div>
      </div>

    </div>
  </div>
</div>

<script>
// ── Eye toggle ──────────────────────────────────────────────────
document.querySelectorAll('.eye-toggle').forEach(btn => {
  btn.addEventListener('click', () => {
    const inp = document.getElementById(btn.dataset.target);
    const isPass = inp.type === 'password';
    inp.type = isPass ? 'text' : 'password';
    btn.querySelector('.eye-show').style.display = isPass ? 'none'  : '';
    btn.querySelector('.eye-hide').style.display = isPass ? ''      : 'none';
  });
});

// ── Password strength ───────────────────────────────────────────
const newPwEl    = document.getElementById('new-password');
const fillEl     = document.getElementById('reset-strength-fill');
const strengthTx = document.getElementById('reset-strength-text');
const confirmEl  = document.getElementById('confirm-password');
const matchEl    = document.getElementById('match-indicator');

function checkStrength(pw) {
  let score = 0;
  if (pw.length >= 8)  score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  return score;
}

newPwEl.addEventListener('input', () => {
  const pw = newPwEl.value;
  if (!pw) { fillEl.style.width = '0'; strengthTx.textContent = ''; return; }
  const score = checkStrength(pw);
  const map = ['','Weak','Fair','Good','Strong'];
  const colors = ['','#ff1744','#ffea00','#00e5ff','#00e676'];
  fillEl.style.width  = (score * 25) + '%';
  fillEl.style.background = colors[score];
  strengthTx.textContent = map[score] || '';
  checkMatch();
});

confirmEl.addEventListener('input', checkMatch);

function checkMatch() {
  if (!confirmEl.value) { matchEl.textContent = ''; return; }
  matchEl.textContent = confirmEl.value === newPwEl.value ? '✓' : '✗';
  matchEl.style.color = confirmEl.value === newPwEl.value
    ? 'var(--success)' : 'var(--danger)';
}

// ── Token check ─────────────────────────────────────────────────
const params = new URLSearchParams(window.location.search);
const token  = params.get('token');

if (!token) {
  document.getElementById('reset-form-state').style.display = 'none';
  document.getElementById('error-state').style.display = 'flex';
}

// ── Submit ───────────────────────────────────────────────────────
const resetBtn = document.getElementById('reset-btn');
const errEl    = document.getElementById('reset-error');

resetBtn?.addEventListener('click', async () => {
  const newPw  = newPwEl.value.trim();
  const confPw = confirmEl.value.trim();
  errEl.textContent = '';

  if (newPw.length < 8) {
    errEl.textContent = 'Password must be at least 8 characters.';
    return;
  }
  if (newPw !== confPw) {
    errEl.textContent = 'Passwords do not match.';
    return;
  }

  // Loading state
  resetBtn.querySelector('.btn-text').style.display   = 'none';
  resetBtn.querySelector('.btn-spinner').style.display = '';
  resetBtn.disabled = true;

  try {
    const res  = await fetch('http://localhost:5000/api/auth/reset-password', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ token, new_password: newPw })
    });
    const data = await res.json();

    if (!res.ok) {
      errEl.textContent = data.error || 'Reset failed. Please try again.';
      resetBtn.querySelector('.btn-text').style.display   = '';
      resetBtn.querySelector('.btn-spinner').style.display = 'none';
      resetBtn.disabled = false;

      // If expired, show link to go back
      if (data.error && data.error.toLowerCase().includes('expir')) {
        errEl.innerHTML = `${data.error} <a href="login.html" style="color:var(--accent)">Request a new link</a>`;
      }
      return;
    }

    // SUCCESS
    document.getElementById('reset-form-state').style.display = 'none';
    document.getElementById('success-state').style.display = 'flex';
    setTimeout(() => { window.location.href = 'login.html'; }, 2500);

  } catch (e) {
    errEl.textContent = 'Network error. Please try again.';
    resetBtn.querySelector('.btn-text').style.display   = '';
    resetBtn.querySelector('.btn-spinner').style.display = 'none';
    resetBtn.disabled = false;
  }
});
</script>
</body>
</html>
